[database]
url = "postgresql://postgres:TU_PASSWORD@db.XXXXXXXXXX.supabase.co:5432/postgres"

# Reemplazar:
# TU_PASSWORD  → la contraseña que creaste en Supabase
# XXXXXXXXXX   → el ID de tu proyecto Supabase (aparece en la URL del dashboard)